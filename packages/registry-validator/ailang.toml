[package]
name = "sunholo/registry_validator"
version = "0.1.0"
edition = "1"
ailang = ">=0.9.5"
description = "AILANG package validator — validates packages before registry publish (dogfooding: validates AILANG packages using AILANG)"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/registry_validator/validate",
  "sunholo/registry_validator/metadata"
]

[effects]
max = ["IO", "FS"]

[metadata]
tags = ["registry", "validation", "dogfooding", "packages"]
ai_summary = "Validate AILANG packages: parse manifest, check exports, compute hashes, generate metadata. Written in AILANG."
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/registry-validator"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/registry_validator"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
