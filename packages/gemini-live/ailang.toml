[package]
name = "sunholo/gemini_live"
version = "0.3.0"
edition = "1"
ailang = ">=0.9.2"
description = "Gemini Live API WebSocket protocol — URL construction, message builders, parsers, and feature config for both Vertex AI and Google AI Studio"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/gemini_live/endpoints",
  "sunholo/gemini_live/config",
  "sunholo/gemini_live/messages",
  "sunholo/gemini_live/parsers",
  "sunholo/gemini_live/voices"
]

[effects]
max = []

[metadata]
tags = ["gemini", "live-api", "websocket", "audio", "streaming"]
ai_summary = "WebSocket protocol helpers for Gemini Live API — build setup/text/audio messages, parse responses, configure proactive audio/affective dialog/thinking/VAD. Supports both Vertex AI (2.5) and Google AI Studio (3.1) protocols."
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/gemini-live"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/gemini_live"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
