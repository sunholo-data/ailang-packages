[package]
name = "sunholo/gcp_auth"
version = "0.1.0"
edition = "1"
description = "GCP Application Default Credentials — OAuth2 token exchange, project detection"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/gcp_auth/token",
  "sunholo/gcp_auth/project"
]

[effects]
max = ["FS", "Net", "Env"]

[metadata]
tags = ["gcp", "auth", "oauth2", "cloud-run"]
ai_summary = "Exchange GCP ADC refresh tokens for access tokens, detect default project from gcloud config"

[stability]
level = "experimental"
