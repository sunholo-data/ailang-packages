[package]
name = "sunholo/gcp_auth"
version = "0.8.1"
edition = "1"
ailang = ">=0.12.1"
description = "GCP auth for AILANG services — env var, ADC file, and Cloud Run metadata server fallback"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/gcp_auth/token",
  "sunholo/gcp_auth/project"
]

[effects]
max = ["FS", "Net", "Env"]

[metadata]
tags = ["gcp", "auth", "oauth2", "cloud-run"]
ai_summary = "Exchange GCP ADC refresh tokens for access tokens, detect default project from gcloud config"
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/gcp-auth"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/gcp_auth"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
