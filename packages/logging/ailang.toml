[package]
name = "sunholo/logging"
version = "0.1.1"
edition = "1"
description = "Structured JSON logging to stderr"
license = "Apache-2.0"

[exports]
modules = ["sunholo/logging/logger"]

[effects]
max = ["IO"]

[metadata]
tags = ["logging", "observability", "json"]
ai_summary = "Structured JSON logging (info/warn/error/debug) to stderr for Cloud Run and container environments"

[stability]
level = "experimental"
