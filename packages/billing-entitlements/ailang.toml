[package]
name = "sunholo/billing_entitlements"
version = "0.3.0"
edition = "1"
ailang = ">=0.9.2"
description = "Plan catalog, entitlement resolution, quota checks, usage deltas — pure billing policy"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/billing_entitlements/plan",
  "sunholo/billing_entitlements/entitlement",
  "sunholo/billing_entitlements/capability_check",
  "sunholo/billing_entitlements/quota_policy",
  "sunholo/billing_entitlements/usage_policy"
]

[effects]
max = []

[metadata]
tags = ["billing", "entitlements", "plans", "quota", "policy"]
ai_summary = "Pure billing policy: plan catalog lookup, entitlement resolution from subscription state, quota checks, usage delta computation. No side effects."
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/billing-entitlements"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/billing_entitlements"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
