[package]
name = "sunholo/config"
version = "0.1.1"
edition = "1"
ailang = ">=0.9.5"
description = "Config loading from environment variables with validation"
license = "Apache-2.0"

[exports]
modules = ["sunholo/config/loader"]

[effects]
max = ["Env"]

[metadata]
tags = ["config", "env", "environment"]
ai_summary = "Load and validate config from environment variables with required/optional/default patterns"
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/config"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/config"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
