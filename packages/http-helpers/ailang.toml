[package]
name = "sunholo/http-helpers"
version = "0.1.0"
edition = "1"
description = "HTTP request builders, auth headers, JSON response parsing"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/http-helpers/request",
  "sunholo/http-helpers/response"
]

[effects]
max = ["Net"]

[metadata]
tags = ["http", "api", "rest", "json"]
ai_summary = "Build HTTP requests with auth headers, parse JSON responses, standard error handling"

[stability]
level = "experimental"
