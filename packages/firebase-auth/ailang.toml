[package]
name = "sunholo/firebase_auth"
version = "0.1.2"
edition = "1"
ailang = ">=0.12.1"
description = "Firebase ID token verification (REST API and local JWT/RSA)"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/firebase_auth/firebase_token",
  "sunholo/firebase_auth/firebase_jwt"
]

[effects]
max = ["Net", "Env"]

[metadata]
tags = ["auth", "firebase", "jwt", "rsa"]
ai_summary = "Firebase ID token verification via REST API or local JWT/RSA signature validation"
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/firebase-auth"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/firebase_auth"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
