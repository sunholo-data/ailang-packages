[package]
name = "sunholo/auth"
version = "0.1.0"
edition = "1"
ailang = ">=0.9.5"
description = "API key validation, HMAC signing, bearer token extraction"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/auth/keys",
  "sunholo/auth/bearer"
]

[effects]
max = []

[metadata]
tags = ["auth", "security", "api-key", "hmac"]
ai_summary = "Validate API keys via hash comparison, extract bearer tokens from headers, HMAC signing"
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/auth"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/auth"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
