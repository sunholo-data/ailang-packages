[package]
name = "sunholo/auth"
version = "0.4.1"
edition = "1"
ailang = ">=0.9.5"
description = "API key validation via hash comparison, bearer token extraction"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/auth/keys",
  "sunholo/auth/bearer"
]

[effects]
max = []

[metadata]
tags = ["auth", "security", "api-key", "bearer"]
ai_summary = "Pure API key validation (SHA-256 hash comparison, constant-time) and bearer token extraction"
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/auth"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/auth"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
