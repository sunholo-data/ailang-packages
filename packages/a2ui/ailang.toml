[package]
name = "sunholo/a2ui"
version = "0.1.0"
edition = "1"
ailang = ">=0.9.2"
description = "A2UI component builder — generate declarative UI JSON for cross-platform rendering (Lit, Angular, Flutter, React)"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/a2ui/components"
]

[effects]
max = []

[metadata]
tags = ["a2ui", "ui", "protocol", "rendering", "components"]
ai_summary = "Build A2UI component trees and serialize to flat adjacency-list JSON. Apps define domain-specific mappings; this package provides the primitives and JSON renderer."
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/a2ui"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/a2ui"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
