[package]
name = "sunholo/firestore"
version = "0.6.4"
edition = "1"
ailang = ">=0.9.2"
description = "Firestore REST API client — CRUD operations, queries, field value encoding/decoding, GCP ADC auth"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/firestore/client",
  "sunholo/firestore/fields",
  "sunholo/firestore/query"
]

[dependencies]
"sunholo/gcp_auth" = { path = "../gcp-auth" }
"sunholo/config" = { path = "../config" }

[effects]
max = ["Net", "FS", "Env"]

[metadata]
tags = ["firestore", "gcp", "database", "nosql", "cloud-run"]
ai_summary = "Firestore REST API client for AILANG. CRUD operations (get, set, delete), structured queries, field value encoding/decoding. Uses GCP ADC auth. Designed for Cloud Run services."
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/firestore"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/firestore"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
