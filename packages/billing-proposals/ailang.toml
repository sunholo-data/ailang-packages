[package]
name = "sunholo/billing_proposals"
version = "0.3.1"
edition = "1"
ailang = ">=0.12.1"
description = "Payment proposal model for AI-assisted and human-initiated billing actions"
license = "Apache-2.0"

[exports]
modules = [
  "sunholo/billing_proposals/proposal",
  "sunholo/billing_proposals/proposal_summary"
]

[dependencies]
"sunholo/billing_entitlements" = { path = "../billing-entitlements" }

[effects]
max = []

[metadata]
tags = ["billing", "proposals", "ai-agent", "payment"]
ai_summary = "Create and manage payment proposals — AI agents propose plan changes, humans approve. Pure state machine for proposal lifecycle."
repository = "https://github.com/sunholo-data/ailang-packages/tree/main/packages/billing-proposals"
homepage = "https://ailang.sunholo.com/docs/packages/sunholo/billing_proposals"
license_url = "https://github.com/sunholo-data/ailang-packages/blob/main/LICENSE"

[stability]
level = "experimental"
